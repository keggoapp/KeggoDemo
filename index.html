<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keggo. — What's On Tonight</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Fredoka:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #F2E4C4; --cream-deep: #E7D6AC; --paper: #f7eed6;
      --ink: #1A1715; --ink-soft: #2a2724;
      --tomato: #D84A2A; --tomato-deep: #b73b1f;
      --honey: #F4B944; --green: #2A4A35; --green-deep: #1b3224;
      --grey-600: #605a51; --grey-400: #968e7f; --grey-200: #d9d0bb;
      --card: #ffffff;
      --radius: 16px; --radius-sm: 10px;
      --shadow-hard: 5px 5px 0 var(--ink);
      --shadow-tomato: 5px 5px 0 var(--tomato);
      --shadow-green: 5px 5px 0 var(--green);
      --shadow-honey: 5px 5px 0 var(--honey);
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --border-w: 2.5px;
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--paper); color: var(--ink); line-height: 1.6; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100vh; display: flex; flex-direction: column; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .fade-up { animation: fadeUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
    .scale-in { animation: scaleIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
    .spin { animation: spin 1s linear infinite; }

    .header { background: var(--cream); border-bottom: 3px solid var(--ink); position: sticky; top: 0; z-index: 100; }
    .header-inner { max-width: 1200px; margin: 0 auto; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-mark { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 28px; letter-spacing: -0.03em; color: var(--ink); }
    .logo-mark .dot { color: var(--tomato); }
    .beta-tag { display: inline-block; background: var(--tomato); color: var(--cream); font-family: 'Fredoka', sans-serif; font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 100px; letter-spacing: 0.5px; margin-left: 4px; vertical-align: middle; border: 1.5px solid var(--ink); }
    .nav-pills { display: flex; gap: 4px; }
    .nav-pill { padding: 8px 18px; border-radius: 100px; border: var(--border-w) solid var(--ink); background: var(--cream); color: var(--ink); font-family: 'Fredoka', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all var(--transition); position: relative; }
    .nav-pill:hover { background: var(--card); box-shadow: 3px 3px 0 var(--ink); transform: translate(-1px, -1px); }
    .nav-pill.active { background: var(--ink); color: var(--cream); box-shadow: 3px 3px 0 var(--tomato); }
    .nav-pill .badge { position: absolute; top: -8px; right: -8px; background: var(--tomato); color: var(--cream); border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; border: 2px solid var(--ink); font-family: 'Fredoka', sans-serif; }
    .user-menu { display: flex; align-items: center; gap: 8px; }
    .user-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--green); color: var(--cream); display: flex; align-items: center; justify-content: center; font-family: 'Fredoka', sans-serif; font-size: 14px; font-weight: 700; border: 2px solid var(--ink); }
    .user-name { font-family: 'Fredoka', sans-serif; font-size: 14px; font-weight: 600; }
    .logout-btn { padding: 6px 14px; border: var(--border-w) solid var(--ink); background: var(--cream); border-radius: 100px; font-family: 'Fredoka', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--ink); transition: all var(--transition); }
    .logout-btn:hover { background: var(--tomato); color: var(--cream); box-shadow: 2px 2px 0 var(--ink); }

    .container { max-width: 1200px; margin: 0 auto; padding: 28px 24px; flex: 1; }
    .hero { text-align: center; padding: 40px 24px 8px; }
    .hero-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--cream); border: 2px solid var(--ink); color: var(--green); font-family: 'Fredoka', sans-serif; font-size: 13px; font-weight: 600; padding: 6px 16px; border-radius: 100px; margin-bottom: 16px; box-shadow: 3px 3px 0 var(--green); }
    .hero-badge .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s ease infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .hero h2 { font-family: 'Fredoka', sans-serif; font-size: 40px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 8px; color: var(--ink); }
    .hero h2 em { font-family: 'Caveat', cursive; color: var(--tomato); font-style: normal; font-size: 1.1em; font-weight: 700; }
    .hero p { color: var(--ink-soft); font-size: 16px; max-width: 440px; margin: 0 auto 32px; }
    .hero-scribble { font-family: 'Caveat', cursive; font-weight: 700; font-size: 22px; color: var(--tomato); transform: rotate(-3deg); display: block; margin-bottom: 10px; }

    .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
    .search-input-wrap { flex: 1; position: relative; }
    .search-input-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--grey-400); }
    .search-input-wrap input { width: 100%; padding: 12px 14px 12px 42px; border: var(--border-w) solid var(--ink); border-radius: 100px; font-size: 14px; font-family: 'Inter', sans-serif; background: var(--card); color: var(--ink); transition: all var(--transition); outline: none; }
    .search-input-wrap input:focus { box-shadow: 3px 3px 0 var(--tomato); }
    .search-input-wrap input::placeholder { color: var(--grey-400); }
    .filter-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .filter-select { padding: 10px 14px; border: var(--border-w) solid var(--ink); border-radius: 100px; font-family: 'Fredoka', sans-serif; font-size: 13px; font-weight: 500; background: var(--card); color: var(--ink); cursor: pointer; transition: all var(--transition); outline: none; min-width: 150px; }
    .filter-select:focus { box-shadow: 3px 3px 0 var(--honey); }
    .clear-btn { padding: 10px 16px; border: var(--border-w) solid var(--ink); background: var(--card); border-radius: 100px; font-family: 'Fredoka', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--tomato); transition: all var(--transition); }
    .clear-btn:hover { background: var(--tomato); color: var(--cream); box-shadow: 3px 3px 0 var(--ink); }

    .location-input-wrap { display: flex; gap: 8px; align-items: center; }
    .location-input { flex: 1; padding: 10px 14px; border: var(--border-w) solid var(--ink); border-radius: 100px; font-size: 13px; font-family: 'Inter', sans-serif; background: var(--card); color: var(--ink); outline: none; transition: all var(--transition); }
    .location-input:focus { box-shadow: 3px 3px 0 var(--green); }
    .location-btn { padding: 10px 18px; border: var(--border-w) solid var(--ink); background: var(--green); color: var(--cream); border-radius: 100px; font-family: 'Fredoka', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all var(--transition); box-shadow: 3px 3px 0 var(--ink); }
    .location-btn:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--ink); }

    .cat-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
    .cat-chip { padding: 7px 16px; border-radius: 100px; border: var(--border-w) solid var(--ink); background: var(--card); font-family: 'Fredoka', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all var(--transition); color: var(--ink); display: flex; align-items: center; gap: 6px; }
    .cat-chip:hover { background: var(--cream); box-shadow: 3px 3px 0 var(--ink); transform: translate(-1px, -1px); }
    .cat-chip.active { background: var(--ink); color: var(--cream); box-shadow: 3px 3px 0 var(--tomato); }

    .results-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .results-bar .count { font-size: 13px; color: var(--grey-600); font-weight: 500; font-family: 'Inter', sans-serif; }
    .results-bar .count strong { color: var(--ink); font-weight: 700; }
    .view-btns { display: flex; gap: 2px; background: var(--cream-deep); border-radius: 100px; padding: 3px; border: 2px solid var(--ink); }
    .view-btn { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border: none; background: transparent; border-radius: 50%; cursor: pointer; color: var(--grey-400); transition: all var(--transition); }
    .view-btn.active { background: var(--ink); color: var(--cream); }

    /* ---- EVENT CARDS ---- */
    .events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
    .card { background: var(--card); border-radius: 18px; border: var(--border-w) solid var(--ink); overflow: hidden; transition: all 0.2s ease; position: relative; cursor: pointer; box-shadow: var(--shadow-hard); }
    .card:hover { transform: translate(-2px, -2px); box-shadow: 7px 7px 0 var(--ink); }
    .card-image-wrap { position: relative; overflow: hidden; }
    .card-image { width: 100%; height: 180px; object-fit: cover; background: var(--cream); display: block; border-bottom: var(--border-w) solid var(--ink); }
    .card-icon-badge { position: absolute; top: 10px; left: 10px; width: 38px; height: 38px; background: var(--cream); border: 2.5px solid var(--ink); border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 2px 2px 0 var(--ink); }
    .card-icon-badge svg { width: 20px; height: 20px; }
    .card-content { padding: 16px; }
    .card-cat-tag { display: inline-flex; align-items: center; gap: 5px; font-family: 'Fredoka', sans-serif; font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 100px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; border: 2px solid var(--ink); }
    .card-title { font-family: 'Fredoka', sans-serif; font-size: 17px; font-weight: 700; margin-bottom: 6px; line-height: 1.2; color: var(--ink); letter-spacing: -0.01em; }
    .card-venue-link { font-family: 'Fredoka', sans-serif; font-size: 13px; font-weight: 600; color: var(--green); cursor: pointer; text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 2px; }
    .card-venue-link:hover { color: var(--tomato); }
    .card-meta { display: flex; gap: 12px; font-size: 12px; color: var(--ink-soft); margin-bottom: 12px; margin-top: 6px; font-family: 'Inter', sans-serif; }
    .card-meta span { display: flex; align-items: center; gap: 3px; }
    .card-badges { display: flex; gap: 6px; align-items: center; }
    .card-badge { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: var(--cream); color: var(--ink); border: 2px solid var(--ink); font-size: 12px; font-weight: 700; cursor: pointer; transition: all var(--transition); }
    .card-badge:hover { background: var(--tomato); color: var(--cream); box-shadow: 2px 2px 0 var(--ink); }

    .events-list { display: flex; flex-direction: column; gap: 12px; }
    .list-item { background: var(--card); border: var(--border-w) solid var(--ink); border-left: 5px solid var(--ink); border-radius: var(--radius-sm); padding: 16px; display: flex; gap: 16px; align-items: flex-start; cursor: pointer; transition: all var(--transition); box-shadow: 4px 4px 0 var(--ink); }
    .list-item:hover { transform: translate(-1px, -1px); box-shadow: 5px 5px 0 var(--ink); }
    .list-item-img { width: 100px; height: 80px; border-radius: 10px; object-fit: cover; flex-shrink: 0; background: var(--cream); border: 2px solid var(--ink); }
    .list-item-body { flex: 1; }
    .list-item-title { font-family: 'Fredoka', sans-serif; font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .list-item-meta { font-size: 12px; color: var(--ink-soft); margin-bottom: 6px; }
    .list-item-desc { font-size: 13px; color: var(--ink); line-height: 1.4; }
    .list-item-venue { font-family: 'Fredoka', sans-serif; font-size: 13px; font-weight: 600; color: var(--green); margin-bottom: 4px; }

    .map-wrap { display: grid; grid-template-columns: 1fr 320px; gap: 0; background: var(--card); border-radius: var(--radius); border: var(--border-w) solid var(--ink); overflow: hidden; height: 480px; box-shadow: 6px 6px 0 var(--ink); }
    .map-frame { width: 100%; height: 100%; border: none; z-index: 1; }
    .map-sidebar { max-height: 560px; overflow-y: auto; border-left: var(--border-w) solid var(--ink); padding: 8px; z-index: 10; background: var(--cream); }
    .map-event-chip { display: flex; gap: 10px; padding: 10px; background: white; border: 2px solid var(--ink); border-radius: 12px; margin-bottom: 8px; cursor: pointer; font-size: 12px; transition: all var(--transition); overflow: hidden; box-shadow: 3px 3px 0 var(--ink); }
    .map-event-chip:hover, .map-event-chip.active { background: var(--cream); box-shadow: 3px 3px 0 var(--tomato); border-color: var(--tomato); }
    .map-event-chip-img { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: var(--cream); border: 2px solid var(--ink); }
    .map-event-chip-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
    .map-event-chip-title { font-family: 'Fredoka', sans-serif; font-weight: 700; margin-bottom: 3px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 13px; }
    .map-event-chip-venue { font-family: 'Fredoka', sans-serif; font-size: 11px; color: var(--green); font-weight: 600; margin-bottom: 3px; }
    .map-event-chip-meta { font-size: 11px; color: var(--ink-soft); margin-bottom: 3px; }
    .map-event-chip-price { font-family: 'Fredoka', sans-serif; font-size: 12px; font-weight: 700; }

    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(26,23,21,0.65); display: flex; align-items: center; justify-content: center; z-index: 10000; padding: 20px; }
    .modal { background: var(--card); border-radius: 20px; padding: 28px; max-width: 480px; width: 100%; max-height: 80vh; overflow-y: auto; position: relative; border: 3px solid var(--ink); box-shadow: 8px 8px 0 var(--ink); }
    .detail-modal { background: var(--card); border-radius: 20px; padding: 28px; max-width: 520px; width: 100%; max-height: 85vh; overflow-y: auto; position: relative; border: 3px solid var(--ink); box-shadow: 8px 8px 0 var(--tomato); }
    .modal-close { position: absolute; top: 16px; right: 16px; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; background: var(--cream); border: 2px solid var(--ink); border-radius: 50%; cursor: pointer; color: var(--ink); font-size: 18px; transition: all var(--transition); font-family: monospace; z-index: 1; }
    .modal-close:hover { background: var(--tomato); color: var(--cream); }

    .login-tabs { display: flex; gap: 0; margin-bottom: 24px; border: var(--border-w) solid var(--ink); border-radius: 100px; overflow: hidden; }
    .login-tab { flex: 1; padding: 12px; text-align: center; background: var(--cream); border: none; font-family: 'Fredoka', sans-serif; font-size: 14px; font-weight: 600; color: var(--ink); cursor: pointer; transition: all var(--transition); }
    .login-tab.active { background: var(--ink); color: var(--cream); }
    .login-form { display: flex; flex-direction: column; gap: 16px; }
    .form-field { display: flex; flex-direction: column; gap: 6px; }
    .form-field label { font-family: 'Fredoka', sans-serif; font-size: 13px; font-weight: 600; color: var(--ink-soft); }
    .form-field input { padding: 11px 16px; border: var(--border-w) solid var(--ink); border-radius: 100px; font-size: 14px; font-family: 'Inter', sans-serif; background: var(--cream); color: var(--ink); outline: none; transition: all var(--transition); }
    .form-field input:focus { box-shadow: 3px 3px 0 var(--tomato); }
    .form-error { color: var(--tomato); font-family: 'Fredoka', sans-serif; font-size: 12px; font-weight: 600; }
    .oauth-btns { display: flex; gap: 10px; }
    .oauth-btn { flex: 1; padding: 10px 12px; border: var(--border-w) solid var(--ink); background: var(--card); border-radius: 100px; font-family: 'Fredoka', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--ink); transition: all var(--transition); }
    .oauth-btn:hover { background: var(--cream); box-shadow: 3px 3px 0 var(--ink); }
    .form-submit { padding: 12px 24px; background: var(--tomato); color: var(--cream); border: var(--border-w) solid var(--ink); border-radius: 100px; font-family: 'Fredoka', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all var(--transition); margin-top: 8px; box-shadow: 4px 4px 0 var(--ink); }
    .form-submit:hover { transform: translate(-1px, -1px); box-shadow: 5px 5px 0 var(--ink); }

    .detail-poster { width: 100%; height: 280px; object-fit: cover; border-radius: 14px; margin-bottom: 20px; background: var(--cream); display: block; border: var(--border-w) solid var(--ink); }
    .detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
    .detail-title { font-family: 'Fredoka', sans-serif; font-size: 26px; font-weight: 700; letter-spacing: -0.02em; flex: 1; color: var(--ink); line-height: 1.1; }
    .detail-actions { display: flex; gap: 8px; }
    .detail-action-btn { width: 40px; height: 40px; border-radius: 50%; border: var(--border-w) solid var(--ink); background: var(--cream); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all var(--transition); color: var(--ink); }
    .detail-action-btn:hover { background: var(--tomato); color: var(--cream); box-shadow: 2px 2px 0 var(--ink); }
    .detail-action-btn.saved { background: var(--tomato); color: var(--cream); }
    .detail-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .detail-info-item { padding: 14px; background: var(--cream); border-radius: 12px; border: 2px solid var(--ink); }
    .detail-info-label { font-family: 'Fredoka', sans-serif; font-size: 11px; font-weight: 600; color: var(--grey-600); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
    .detail-info-value { font-family: 'Fredoka', sans-serif; font-size: 15px; font-weight: 700; color: var(--ink); }
    .detail-description { font-size: 14px; line-height: 1.6; color: var(--ink); margin-bottom: 20px; padding: 14px; background: var(--cream); border-radius: 12px; border: 2px solid var(--ink); }
    .google-map-embed { width: 100%; height: 180px; border-radius: 12px; border: 2px solid var(--ink); }

    .form-panel { background: var(--card); border: var(--border-w) solid var(--ink); border-radius: 20px; padding: 36px; max-width: 640px; margin: 0 auto; box-shadow: 6px 6px 0 var(--ink); }
    .form-panel h2 { font-family: 'Fredoka', sans-serif; font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
    .form-panel .subtitle { color: var(--ink-soft); font-size: 14px; margin-bottom: 28px; }
    .poster-upload { border: 3px dashed var(--ink); border-radius: 14px; padding: 24px; text-align: center; cursor: pointer; transition: all var(--transition); margin-bottom: 24px; background: var(--cream); }
    .poster-upload:hover { background: var(--card); box-shadow: 4px 4px 0 var(--honey); }
    .poster-upload input[type="file"] { display: none; }
    .poster-upload-content { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .poster-upload-icon { font-size: 28px; color: var(--grey-400); }
    .poster-upload-text { font-family: 'Fredoka', sans-serif; font-size: 14px; font-weight: 600; color: var(--ink-soft); }
    .poster-preview { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; margin-bottom: 16px; background: var(--cream); border: 2px solid var(--ink); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-grid.full { grid-template-columns: 1fr; }
    .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 2px; }
    .field label { font-family: 'Fredoka', sans-serif; font-size: 13px; font-weight: 600; color: var(--ink-soft); }
    .field input, .field select, .field textarea { padding: 10px 14px; border: var(--border-w) solid var(--ink); border-radius: 10px; font-size: 14px; font-family: 'Inter', sans-serif; background: var(--cream); color: var(--ink); outline: none; transition: all var(--transition); }
    .field input:focus, .field select:focus, .field textarea:focus { box-shadow: 3px 3px 0 var(--tomato); }
    .field textarea { resize: vertical; min-height: 80px; }
    .form-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }
    .btn-primary { padding: 11px 24px; background: var(--tomato); color: var(--cream); border: var(--border-w) solid var(--ink); border-radius: 100px; font-family: 'Fredoka', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all var(--transition); box-shadow: 4px 4px 0 var(--ink); }
    .btn-primary:hover { transform: translate(-1px, -1px); box-shadow: 5px 5px 0 var(--ink); }
    .btn-ghost { padding: 11px 24px; background: var(--cream); color: var(--ink); border: var(--border-w) solid var(--ink); border-radius: 100px; font-family: 'Fredoka', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: all var(--transition); }
    .btn-ghost:hover { background: var(--card); box-shadow: 3px 3px 0 var(--ink); }

    /* ---- VENUE PROFILE ---- */

      const dLat = (lat2 - lat1) * Math.PI / 180;

      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    /* --- Edit Venue Profile (for venue owners) --- */
    function EditVenueProfile({ user, profiles, onSave, onCancel }) {
      const existing = profiles[user.name] || { displayName: "", address: "", bio: "", website: "", photo: null, services: [], hours: { Mon: "", Tue: "", Wed: "", Thu: "", Fri: "", Sat: "", Sun: "" } };
      const [displayName, setDisplayName] = useState(existing.displayName || "");
      const [address, setAddress] = useState(existing.address || "");
      const [bio, setBio] = useState(existing.bio);
      const [website, setWebsite] = useState(existing.website);
      const [photo, setPhoto] = useState(existing.photo);
      const [services, setServices] = useState(existing.services);
      const [hours, setHours] = useState(existing.hours);
      const photoInputRef = useRef(null);
      const addressInputRef = useRef(null);
      const autocompleteRef = useRef(null);

      const currentImage = photo || VENUE_IMAGES_DEFAULT[user.name] || null;

      useEffect(() => {
        let interval;
        const initAutocomplete = () => {
          if (window.google && window.google.maps && window.google.maps.places && addressInputRef.current && !autocompleteRef.current) {
            autocompleteRef.current = new google.maps.places.Autocomplete(addressInputRef.current, {
              componentRestrictions: { country: 'gb' },
              fields: ['formatted_address', 'geometry', 'name']
            });
            autocompleteRef.current.addListener('place_changed', () => {
              const place = autocompleteRef.current.getPlace();
              if (place && place.formatted_address) {
                setAddress(place.formatted_address);
              }
            });
          }
        };
        initAutocomplete();
        if (!autocompleteRef.current) {
          interval = setInterval(initAutocomplete, 200);
        }
        return () => { if (interval) clearInterval(interval); };
      }, []);

      const toggleService = (s) => {
        setServices(prev => prev.includes(s) ? prev.filter(x => x !== s) : [...prev, s]);
      };

      const handlePhotoChange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => setPhoto(reader.result);
          reader.readAsDataURL(file);
        }

    function MapView({ events, selectedEvent, onSelectEvent, userLocation, venueProfiles }) {
      const mapRef = useRef(null);
      const mapInstance = useRef(null);
      const markersRef = useRef([]);
      const [mapReady, setMapReady] = useState(false);

      useEffect(() => {
        let interval;
        const initMap = () => {
          if (window.google && window.google.maps && mapRef.current && !mapInstance.current) {
            const center = userLocation || { lat: 51.378, lng: -0.475 };
            mapInstance.current = new google.maps.Map(mapRef.current, {
              center: center,
              zoom: 13,
              styles: GMAP_STYLES,
              disableDefaultUI: false,
              zoomControl: true,
              mapTypeControl: false,
              streetViewControl: false,
              fullscreenControl: false,
            });
            setMapReady(true);
            if (interval) clearInterval(interval);
          }
        };
        initMap();
        if (!mapInstance.current) {
          interval = setInterval(initMap, 200);
        }
        return () => { if (interval) clearInterval(interval); };
      }, []);

      useEffect(() => {
        if (!mapInstance.current || !mapReady) return;
        // Clear existing markers
        markersRef.current.forEach(m => m.setMap(null));
        markersRef.current = [];

        events.forEach(event => {
          const coords = VENUE_COORDS[event.venue];
          if (coords) {
            const marker = new google.maps.Marker({
              position: { lat: coords.lat, lng: coords.lng },
              map: mapInstance.current,
              icon: {
                url: createMapMarkerSVG(event.category),
                scaledSize: new google.maps.Size(44, 44),
                anchor: new google.maps.Point(22, 22),
              },
              title: event.title,
            });
            marker.addListener('click', () => {
              onSelectEvent(event);
              mapInstance.current.panTo({ lat: coords.lat, lng: coords.lng });
            });
            markersRef.current.push(marker);
          }
        });
      }, [events, mapReady, onSelectEvent]);

      useEffect(() => {
        if (mapInstance.current && selectedEvent) {
          const coords = VENUE_COORDS[selectedEvent.venue];
          if (coords) {
            mapInstance.current.panTo({ lat: coords.lat, lng: coords.lng });
          }
        }
      }, [selectedEvent]);

      return (
        <div className="map-wrap">
          <div style={{ position: "relative", width: "100%", height: "100%" }}>
            <div ref={mapRef} className="map-frame" style={{ position: "absolute", top: 0, left: 0, width: "100%", height: "100%" }}></div>
            {!mapReady && (
              <div style={{ position: "absolute", top: 0, left: 0, width: "100%", height: "100%", display: "flex", alignItems: "center", justifyContent: "center", background: "var(--cream)", zIndex: 2 }}>
                <div style={{ textAlign: "center" }}>
                  <div style={{ width: "32px", height: "32px", border: "3px solid var(--ink)", borderTopColor: "transparent", borderRadius: "50%", margin: "0 auto 12px" }} className="spin"></div>
                  <span style={{ fontFamily: "'Fredoka', sans-serif", fontSize: "14px", fontWeight: 600, color: "var(--grey-400)" }}>Loading map...</span>
                </div>
              </div>
            )}
          </div>
          <div className="map-sidebar">
            {events.map(event => (
              <div key={event.id} className={`map-event-chip ${selectedEvent?.id === event.id ? "active" : ""}`} onClick={() => onSelectEvent(event)}>
                <img className="map-event-chip-img" src={getPosterImage(event, venueProfiles)} alt={event.venue} loading="lazy" />
                <div className="map-event-chip-info">
                  <div className="map-event-chip-title">{event.title}</div>
                  <div className="map-event-chip-venue">{event.venue}</div>
                  <div className="map-event-chip-meta">{formatDate(event.date).weekday} &middot; {event.time}</div>
                  <div className="map-event-chip-price" style={{ color: event.price === "Free" ? "var(--green)" : "var(--ink)" }}>{event.price}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function App() {
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [events, setEvents] = useState(INITIAL_EVENTS);
      const [savedEvents, setSavedEvents] = useState([]);
      const [view, setView] = useState("grid");
      const [search, setSearch] = useState("");
      const [category, setCategory] = useState([]);
      const [dateFilter, setDateFilter] = useState("any");
      const [dateRange, setDateRange] = useState({ start: genDate(0), end: genDate(30) });
      const [distanceFilter, setDistanceFilter] = useState(10);
      const [sportFilter, setSportFilter] = useState(null);
      const [showMoreCats, setShowMoreCats] = useState(false);
      const [userLocation, setUserLocation] = useState(null);
      const [locationInput, setLocationInput] = useState("");
      const [showAddEvent, setShowAddEvent] = useState(false);
      const [editingEvent, setEditingEvent] = useState(null);
      const [selectedEvent, setSelectedEvent] = useState(null);
      const [toast, setToast] = useState(null);
      const [venueProfiles, setVenueProfiles] = useState(DEFAULT_PROFILES);
      const [viewingVenue, setViewingVenue] = useState(null);
      const [exploreTab, setExploreTab] = useState("events");
      const locationSearchRef = useRef(null);
      const locationSearchAutocompleteRef = useRef(null);

      /* --- Supabase auth: check session on load + listen for changes --- */
      const mapSupabaseUser = useCallback((supaUser) => {
        if (!supaUser) return null;
        const meta = supaUser.user_metadata || {};
        return {
          email: supaUser.email,
          name: meta.full_name || meta.name || supaUser.email.split("@")[0],
          type: "user",
          area: "Local",
          avatar_url: meta.avatar_url || meta.picture || null,
          supabaseId: supaUser.id,
        };
      }, []);

      useEffect(() => {
        let mounted = true;
        supabase.auth.getSession().then(({ data: { session } }) => {
          if (mounted && session?.user) setUser(mapSupabaseUser(session.user));
          if (mounted) setAuthLoading(false);
        });
        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
          if (mounted) {
            if (session?.user) setUser(mapSupabaseUser(session.user));
            else setUser(null);
            setAuthLoading(false);
          }
        });
        return () => { mounted = false; subscription.unsubscribe(); };
      }, [mapSupabaseUser]);

      const handleSignOut = async () => {
        const { error } = await supabase.auth.signOut();
        if (!error) setUser(null);
      };

      useEffect(() => {
        if ("geolocation" in navigator) {
          navigator.geolocation.getCurrentPosition(pos => setUserLocation({ lat: pos.coords.latitude, lng: pos.coords.longitude }), () => setUserLocation(null));
        }
      }, []);

      useEffect(() => {
        // Only attempt to bind when the search input is actually rendered (Events tab)
        if (exploreTab !== "events") return;
        let interval;
        let cancelled = false;
        const initAutocomplete = () => {
          if (cancelled) return true;
          if (!locationSearchRef.current) return false;
          if (!(window.google && window.google.maps && window.google.maps.places)) return false;
          // Re-bind if the underlying DOM input has changed (e.g. tab switch unmounted/remounted it)
          if (locationSearchAutocompleteRef.current && locationSearchAutocompleteRef.current.__bound === locationSearchRef.current) {
            return true;
          }
          const ac = new google.maps.places.Autocomplete(locationSearchRef.current, {
            componentRestrictions: { country: 'gb' },
            fields: ['geometry', 'name', 'formatted_address'],
            types: ['establishment', 'geocode']
          });
          ac.__bound = locationSearchRef.current;
          ac.addListener('place_changed', () => {
            const place = ac.getPlace();
            if (place && place.geometry && place.geometry.location) {
              setUserLocation({
                lat: place.geometry.location.lat(),
                lng: place.geometry.location.lng()
              });
              setLocationInput(place.name || place.formatted_address || '');
            }
          });
          // Stop the browser autofill stomping on the dropdown
          locationSearchRef.current.setAttribute('autocomplete', 'off');
          locationSearchAutocompleteRef.current = ac;
          if (interval) { clearInterval(interval); interval = null; }
          return true;
        };
        if (!initAutocomplete()) {
          interval = setInterval(initAutocomplete, 250);
        }
        return () => { cancelled = true; if (interval) clearInterval(interval); };
      }, [exploreTab]);

      const showToast = useCallback((msg) => { setToast(msg); setTimeout(() => setToast(null), 2000); }, []);

      const handleLocationInput = (e) => {
        const raw = e.target.value;

        const normalized = trimmed.toUpperCase();
        if (LOCATION_LOOKUP[normalized] || LOCATION_LOOKUP[trimmed]) {
          setUserLocation(LOCATION_LOOKUP[normalized] || LOCATION_LOOKUP[trimmed]);

      };

      const handleUseMyLocation = () => {

      const filteredEvents = useMemo(() => {
        let result = events;
        if (search && search.trim()) {
          const tokens = search.toLowerCase().trim().split(/\s+/).filter(Boolean);
          result = result.filter(e => {
            const catLabel = (CATEGORIES.find(c => c.id === e.category)?.label || "").toLowerCase();
            const sportLabel = (SPORT_TYPES.find(s => s.id === e.sportType)?.label || "").toLowerCase();
            const haystack = [
              e.title, e.venue, e.area, e.description, e.location,
              catLabel, sportLabel, e.category, e.sportType, e.price, e.time
            ].filter(Boolean).join(" ").toLowerCase();
            return tokens.every(t => haystack.includes(t));
          });
        }
        if (category.length > 0) result = result.filter(e => category.includes(e.category));
        if (category.includes("sports") && sportFilter) {
          result = result.filter(e => e.category !== "sports" || e.sportType === sportFilter);
        }
        if (dateFilter === "month") {
          const now = new Date();
          result = result.filter(e => {
            const d = new Date(e.date + "T00:00:00");
            return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
          });
        }
        else if (dateFilter === "range") {
          const { start, end } = dateRange;
          if (start && end && end >= start) {
            result = result.filter(e => e.date >= start && e.date <= end);
          }
        }
        if (distanceFilter > 0 && userLocation) result = result.filter(e => { const dist = getEventDistance(e, userLocation); return dist !== null && dist <= distanceFilter; });
        return result.sort((a, b) => new Date(a.date) - new Date(b.date));
      }, [events, search, category, sportFilter, dateFilter, dateRange.start, dateRange.end, distanceFilter, userLocation]);

      const handleSaveEvent = (event) => { setSavedEvents(prev => prev.some(e => e.id === event.id) ? prev.filter(e => e.id !== event.id) : [...prev, event]); };

      const handleAddEvent = (newEvent) => {

                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                  {selectedEvent && <EventDetailModal event={selectedEvent} onClose={() => setSelectedEvent(null)} onSave={handleSaveEvent} savedEvents={savedEvents} showToast={showToast} userLocation={userLocation} onViewVenue={handleViewVenue} venueProfiles={venueProfiles} />}
                </div>
              )}
            </>
          )}

          {viewingVenue && <VenueProfileModal venueName={viewingVenue.name} venueArea={viewingVenue.area} profiles={venueProfiles} onClose={() => setViewingVenue(null)} />}
          {toast && <div className="toast">{toast}</div>}

          <footer className="footer">
            <div className="footer-links"><a href="#">About</a><a href="#">Venues</a><a href="#">Privacy</a><a href="#">Contact</a></div>
            <p style={{ fontFamily: "'Fredoka', sans-serif", fontWeight: 600 }}>&copy; 2026 Keggo<span style={{ color: "var(--tomato)" }}>.</span> All rights reserved.</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
